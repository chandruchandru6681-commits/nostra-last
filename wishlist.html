<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nostra - Wishlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0eb; --surface: #ffffff; --accent: #c8522a;
      --accent-light: #f0e0d8; --text-dark: #1a1209; --text-mid: #5a4a3a;
      --text-light: #9c8878; --border: #e2d9d0;
      --shadow: 0 4px 24px rgba(60,30,10,0.08);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-dark); min-height: 100vh; padding: 40px 16px 80px; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1' fill='%23c8b09a' opacity='0.25'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
    .page-wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
    .page-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 40px; animation: fadeDown 0.5s ease both; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); color: var(--text-dark); letter-spacing: -0.5px; }
    .wishlist-count { font-size: 0.85rem; font-weight: 500; background: var(--accent); color: #fff; border-radius: 50px; padding: 3px 12px; letter-spacing: 0.5px; }
    .empty-wishlist { text-align: center; padding: 80px 20px; }
    .empty-wishlist h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--text-dark); margin-bottom: 16px; }
    .empty-wishlist p { color: var(--text-mid); margin-bottom: 32px; }
    .empty-wishlist .btn { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.2s; }
    .empty-wishlist .btn:hover { background: #b04420; }
    .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .wishlist-item { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); animation: slideUp 0.4s ease both; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .wishlist-item:nth-child(1) { animation-delay: 0.05s; }
    .wishlist-item:nth-child(2) { animation-delay: 0.12s; }
    .wishlist-item:nth-child(3) { animation-delay: 0.19s; }
    .wishlist-item:nth-child(4) { animation-delay: 0.26s; }
    .wishlist-item:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(60,30,10,0.12); }
    .item-image { width: 100%; height: 200px; overflow: hidden; background: var(--accent-light); position: relative; }
    .item-image img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
    .wishlist-item:hover .item-image img { transform: scale(1.05); }
    .remove-btn { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .remove-btn:hover { background: #fff; transform: scale(1.1); }
    .remove-btn svg { width: 16px; height: 16px; color: var(--text-mid); }
    .item-content { padding: 20px; }
    .item-category { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 8px; }
    .item-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--text-dark); line-height: 1.3; margin-bottom: 8px; }
    .item-price { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text-dark); font-weight: 600; }
    .item-actions { margin-top: 16px; display: flex; gap: 8px; }
    .btn { padding: 8px 16px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; display: inline-block; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #b04420; }
    .btn-secondary { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent); }
    .btn-secondary:hover { background: #e8c8b8; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { .wishlist-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; } }
  </style>
</head>
<body>
<div class="page-wrapper">
  <header class="page-header">
    <h1>My Wishlist</h1>
    <span class="wishlist-count" id="wishlist-count">0 items</span>
  </header>

  <div id="wishlist-content">
    <!-- Content will be populated by JavaScript -->
  </div>
</div>

<script src="wishlist.js"></script>
</body>
</html>
